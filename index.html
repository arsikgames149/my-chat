<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Clone</title>
    <style>
        /* CSS ПЕРЕМЕННЫЕ ДЛЯ ТЕМ */
        :root {
            --bg-main: #0e1621;
            --bg-side: #17212b;
            --bg-panel: #242f3d;
            --text: #ffffff;
            --text-me: #ffffff;
            --text-them: #ffffff;
            --msg-me: #2b5278;
            --msg-them: #182533;
            --border: #000000;
            --hover: #202b36;
            --btn: #5288c1;
        }

        body.light-theme {
            --bg-main: #e4ebf0;
            --bg-side: #ffffff;
            --bg-panel: #f5f5f5;
            --text: #000000;
            --text-me: #000000;
            --text-them: #000000;
            --msg-me: #effdde;
            --msg-them: #ffffff;
            --border: #cccccc;
            --hover: #f0f0f0;
            --btn: #3390ec;
        }

        /* --- АНИМАЦИИ (КЛЮЧЕВЫЕ КАДРЫ) --- */
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* --- БАЗОВЫЕ СТИЛИ С ПЛАВНЫМИ ПЕРЕХОДАМИ --- */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: var(--bg-main); color: var(--text); overflow: hidden; transition: background 0.4s ease, color 0.4s ease; }
        
        #sidebar { width: 300px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: background 0.4s ease, border-color 0.4s ease; z-index: 2; }
        #my-profile { padding: 15px; background: var(--bg-panel); display: flex; flex-direction: column; gap: 10px; transition: background 0.4s ease; }
        .profile-name { font-weight: bold; font-size: 18px; color: var(--text); }
        
        /* Кнопки с эффектом нажатия */
        .action-btn { background: var(--btn); color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; transition: background 0.2s, transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { filter: brightness(1.1); }
        .action-btn:active { transform: scale(0.95); }
        
        .circle-btn { background: var(--btn); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; transition: background 0.2s, transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .circle-btn:active { transform: scale(0.92); }

        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s ease, border-color 0.4s ease; }
        .chat-item:hover { background: var(--hover); }
        .chat-item.active { background: var(--btn); color: #fff; }
        
        .avatar { width: 40px; height: 40px; background: #5288c1; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; flex-shrink: 0; transition: transform 0.3s ease; }
        .chat-item:hover .avatar { transform: scale(1.05); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        #main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); transition: background 0.4s ease; position: relative; }
        #chat-header { padding: 15px; background: var(--bg-side); font-weight: bold; font-size: 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: background 0.4s ease, border-color 0.4s ease; z-index: 10; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        /* Анимация сообщений */
        .msg-wrapper { max-width: 60%; display: flex; flex-direction: column; gap: 5px; animation: slideUp 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; transform-origin: left bottom; }
        
        .msg { padding: 10px 15px; border-radius: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); transition: background 0.4s ease, color 0.4s ease; }
        .msg.me { background: var(--msg-me); color: var(--text-me); border-bottom-right-radius: 2px; }
        .msg.them { background: var(--msg-them); color: var(--text-them); border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        
        .del-btn { font-size: 12px; cursor: pointer; color: #8b3a3a; background: none; border: none; opacity: 0; transition: opacity 0.2s ease, transform 0.1s ease; transform: translateY(-5px); }
        .msg-wrapper:hover .del-btn { opacity: 0.8; transform: translateY(0); }
        .del-btn:hover { opacity: 1; transform: scale(1.05) !important; }

        #input-area { padding: 15px; background: var(--bg-side); display: flex; gap: 10px; align-items: center; transition: background 0.4s ease; z-index: 10; }
        #msg-input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: var(--bg-panel); color: var(--text); outline: none; transition: background 0.4s ease, color 0.4s ease, box-shadow 0.2s; }
        #msg-input:focus { box-shadow: 0 0 0 2px var(--btn); }
        
        /* Модальные окна с пружинящей анимацией */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.2s ease forwards; }
        .modal.hidden { display: none; }
        .modal-content { background: var(--bg-side); color: var(--text); padding: 30px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal input[type="text"], .modal input[type="date"] { width: 90%; padding: 10px; margin: 10px 0 15px 0; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text); outline: none; transition: box-shadow 0.2s, background 0.4s ease; }
        .modal input[type="text"]:focus, .modal input[type="date"]:focus { box-shadow: 0 0 0 2px var(--btn); }
    </style>

    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=109919751', 'ym');
        ym(109919751, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/109919751" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    </head>
<body>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Создай профиль</h3>
            <input type="text" id="setup-username" placeholder="Арсений">
            <button class="action-btn" onclick="initProfile()">Войти в чат</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Настройки профиля</h3>
            <div style="text-align: left; margin-bottom: 10px;">
                <label style="font-size: 14px;">Аватарка (до 500 КБ):</label>
                <input type="file" id="settings-avatar" accept="image/*" style="margin-top: 5px; width: 100%;">
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="font-size: 14px;">Дата рождения:</label>
                <input type="date" id="settings-dob" value="2000-01-01">
            </div>
            <button class="action-btn" onclick="saveSettings()" style="width: 100%; margin-bottom: 10px;">Сохранить в облако</button>
            <button class="action-btn" style="background:#8b3a3a; width: 100%;" onclick="closeSettings()">Отмена</button>
        </div>
    </div>

    <div id="search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Найти пользователя</h3>
            <input type="text" id="search-username" placeholder="Кого ищем?">
            <button class="action-btn" onclick="startNewChat()">Начать чат</button>
            <button class="action-btn" style="background:#8b3a3a; margin-top:10px;" onclick="closeSearch()">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div id="my-profile">
            <div style="display: flex; align-items: center; gap: 10px; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="avatar" id="my-avatar-display">?</div>
                    <div>
                        <div style="font-size: 12px; opacity: 0.7;">Мой профиль:</div>
                        <div class="profile-name" id="my-name-display">Загрузка...</div>
                    </div>
                </div>
                <button class="circle-btn" style="width:30px; height:30px; font-size:14px; background:transparent; border: 1px solid var(--border); color: var(--text);" onclick="toggleTheme()" id="theme-btn">🌙</button>
            </div>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button class="action-btn" onclick="openSettings()" style="flex: 1;">⚙️</button>
                <button class="action-btn" onclick="openSearch()" style="flex: 4;">🔍 Найти</button>
            </div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-area">
        <div id="chat-header" class="hidden">
            <div class="avatar" id="header-avatar">?</div>
            <div id="header-name">Выберите чат слева</div>
        </div>
        <div id="messages">
            <div style="text-align:center; opacity: 0.5; margin-top:50px;">
                Выберите пользователя слева, чтобы начать общение.
            </div>
        </div>
        <div id="input-area" class="hidden">
            <input type="file" id="img-upload" accept="image/*" style="display:none;">
            <button class="circle-btn" onclick="document.getElementById('img-upload').click()">📷</button>
            
            <input type="text" id="msg-input" placeholder="Написать сообщение...">
            <button class="circle-btn" onclick="sendTextMessage()">➤</button>
        </div>
    </div>

    <script>
        const BIN_ID = "9a59d7dc2e3ad773b0fa";
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let myUsername = localStorage.getItem('myUsername');
        let activeChats = JSON.parse(localStorage.getItem('myChats') || '[]');
        let currentChat = null;
        let allMessages = [];
        let globalProfiles = {}; 
        let tempAvatarBase64 = null; 

        window.onload = () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('theme-btn').innerText = '☀️';
            }

            if (!myUsername) {
                document.getElementById('profile-modal').classList.remove('hidden');
            } else {
                document.getElementById('my-name-display').innerText = myUsername;
                fetchData();
                setInterval(fetchData, 2000); 
            }
            
            document.getElementById("msg-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") sendTextMessage();
            });

            document.getElementById("settings-avatar").addEventListener("change", function() {
                const file = this.files[0];
                if (!file) return;
                if(file.size > 500000) { alert("Максимум 500 КБ!"); this.value = ""; return; }
                const reader = new FileReader();
                reader.onload = function(e) { tempAvatarBase64 = e.target.result; };
                reader.readAsDataURL(file);
            });

            document.getElementById("img-upload").addEventListener("change", function() {
                const file = this.files[0];
                if (!file) return;
                if(file.size > 2000000) { alert("Файл слишком большой! До 2 МБ."); return; }
                const reader = new FileReader();
                reader.onload = async function(e) {
                    await sendData("", e.target.result);
                };
                reader.readAsDataURL(file);
            });
        };

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-btn').innerText = isLight ? '☀️' : '🌙';
        }

        function initProfile() {
            const name = document.getElementById('setup-username').value.trim();
            if (name) {
                myUsername = name;
                localStorage.setItem('myUsername', myUsername);
                document.getElementById('profile-modal').classList.add('hidden');
                document.getElementById('my-name-display').innerText = myUsername;
                fetchData();
                setInterval(fetchData, 2000);
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            tempAvatarBase64 = null;
            if (globalProfiles[myUsername] && globalProfiles[myUsername].dob) {
                document.getElementById('settings-dob').value = globalProfiles[myUsername].dob;
            }
        }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        async function saveSettings() {
            const dob = document.getElementById('settings-dob').value;
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                if (!data.profiles) data.profiles = {};
                if (!data.profiles[myUsername]) data.profiles[myUsername] = {};

                if (tempAvatarBase64) data.profiles[myUsername].avatar = tempAvatarBase64;
                data.profiles[myUsername].dob = dob;

                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                closeSettings();
                fetchData();
            } catch (e) { alert("Ошибка сохранения профиля!"); }
        }

        function openSearch() { document.getElementById('search-modal').classList.remove('hidden'); document.getElementById('search-username').value = ''; }
        function closeSearch() { document.getElementById('search-modal').classList.add('hidden'); }

        function startNewChat() {
            const friendName = document.getElementById('search-username').value.trim();
            if (friendName && friendName !== myUsername) {
                if (!activeChats.includes(friendName)) {
                    activeChats.push(friendName);
                    localStorage.setItem('myChats', JSON.stringify(activeChats));
                }
                closeSearch();
                openChat(friendName);
                renderChatList();
            }
        }

        function getAvatarHTML(username) {
            if (globalProfiles[username] && globalProfiles[username].avatar) {
                return `<img src="${globalProfiles[username].avatar}" alt="${username}">`;
            }
            return username.charAt(0).toUpperCase();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            document.getElementById('my-avatar-display').innerHTML = getAvatarHTML(myUsername);

            activeChats.forEach(chatName => {
                const div = document.createElement('div');
                div.className = `chat-item ${chatName === currentChat ? 'active' : ''}`;
                div.onclick = () => openChat(chatName);
                div.innerHTML = `
                    <div class="avatar">${getAvatarHTML(chatName)}</div>
                    <div style="font-weight:bold;">${chatName}</div>
                `;
                list.appendChild(div);
            });
        }

        function openChat(chatName) {
            currentChat = chatName;
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('header-name').innerText = chatName;
            document.getElementById('header-avatar').innerHTML = getAvatarHTML(chatName);
            renderChatList();
            renderMessages();
        }

        function renderMessages() {
            if (!currentChat) return;
            const container = document.getElementById('messages');
            
            // Проверка, есть ли новые сообщения (чтобы не перерисовывать всё без причины)
            const chatHistory = allMessages.filter(m => 
                (m.from === myUsername && m.to === currentChat) ||
                (m.from === currentChat && m.to === myUsername)
            );

            // Если сообщений нет
            if (chatHistory.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity: 0.5; margin-top:20px;">Здесь пока нет сообщений. Напишите первым!</div>';
                return;
            }

            // Рендер только если количество изменилось (простая оптимизация анимаций)
            if (container.children.length !== chatHistory.length) {
                container.innerHTML = '';
                chatHistory.forEach(msg => {
                    const wrapper = document.createElement('div');
                    const isMe = msg.from === myUsername;
                    wrapper.className = `msg-wrapper ${isMe ? 'me' : 'them'}`;
                    
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : 'them'}`;
                    
                    if (msg.text) div.innerText = msg.text;
                    if (msg.image) {
                        const img = document.createElement('img');
                        img.src = msg.image;
                        div.appendChild(img);
                    }

                    wrapper.appendChild(div);

                    if (isMe) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'del-btn';
                        delBtn.innerText = '🗑️ Удалить';
                        delBtn.onclick = () => deleteMessage(msg.id);
                        wrapper.appendChild(delBtn);
                    }

                    container.appendChild(wrapper);
                });

                container.scrollTop = container.scrollHeight;
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                
                allMessages = data.messages || [];
                globalProfiles = data.profiles || {}; 

                let chatsUpdated = false;
                allMessages.forEach(m => {
                    if (m.to === myUsername && !activeChats.includes(m.from)) {
                        activeChats.push(m.from);
                        chatsUpdated = true;
                    }
                });

                if (chatsUpdated) localStorage.setItem('myChats', JSON.stringify(activeChats));
                
                renderChatList();
                if (currentChat) {
                    document.getElementById('header-avatar').innerHTML = getAvatarHTML(currentChat);
                    renderMessages();
                }
            } catch (e) { console.error("Ошибка загрузки:", e); }
        }

        async function sendTextMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text === "" || !currentChat) return;
            input.value = '';
            await sendData(text, null);
        }

        async function sendData(textData, imageData) {
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                if(!data.messages) data.messages = [];
                
                const msgId = Date.now().toString();

                data.messages.push({ 
                    id: msgId,
                    from: myUsername, 
                    to: currentChat, 
                    text: textData,
                    image: imageData
                });

                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                fetchData();
            } catch (e) { alert("Ошибка отправки!"); }
        }

        async function deleteMessage(msgId) {
            if (!confirm("Точно удалить это сообщение? Друг его тоже больше не увидит.")) return;
            
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                
                if(data.messages) {
                    data.messages = data.messages.filter(m => m.id !== msgId);
                }

                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Сбрасываем чат для перерисовки с анимацией
                const container = document.getElementById('messages');
                container.innerHTML = '';
                fetchData();
            } catch (e) { alert("Ошибка удаления!"); }
        }
    </script>
</body>
