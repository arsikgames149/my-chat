<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ПВЗ Админка</title>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Магазин</h2>
        <div id="shop">Загрузка товаров...</div>
    </div>
    <div class="box">
        <h2>Заказы (Работник)</h2>
        <div id="worker-panel">Загрузка...</div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/3741109c73467226e5c9";

        async function loadData() {
            try {
                const res = await fetch(API_URL, {cache: 'no-store'});
                const data = await res.json();
                
                // Отображение магазина
                document.getElementById('shop').innerHTML = data.products.map(p => 
                    `<p>${p.name} <button onclick="buy('${p.name}')">Купить</button></p>`
                ).join('');

                // Отображение заказов для работника
                document.getElementById('worker-panel').innerHTML = data.orders.map(o => 
                    `<p>Заказ ${o.id} (${o.item}) - <b>${o.status}</b></p>`
                ).join('');
            } catch(e) {
                document.body.innerHTML = "<h1>Ошибка соединения с базой данных!</h1>";
            }
        }

        async function buy(itemName) {
            const res = await fetch(API_URL);
            const data = await res.json();
            data.orders.push({ id: Date.now(), item: itemName, status: "Принят" });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("Заказ оформлен!");
            loadData();
        }

        // Запуск
        loadData();
    </script>
</body>
</html>
