<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Secure Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0e1621; color: white; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #17212b; border-right: 1px solid #000; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        #input-area { padding: 15px; background: #17212b; display: flex; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px; background: #5288c1; color: white; border: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="padding: 15px; font-weight: bold;">Чаты</div>
        <div id="chat-list"></div>
        <button onclick="addChat()">+ Новый чат</button>
    </div>
    <div id="main">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/9a59d7dc2e3ad773b0fa";
        let myName = localStorage.getItem('myUsername');

        if(!myName) {
            myName = prompt("Введите ник (любые буквы):");
            if(myName) {
                localStorage.setItem('myUsername', myName);
                register(myName);
            }
        }

        async function register(name) {
            const res = await fetch(API_URL);
            const data = await res.json();
            data.profiles = data.profiles || {};
            data.profiles[name] = true;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        async function addChat() {
            const name = prompt("Введите ник друга:");
            const res = await fetch(API_URL);
            const data = await res.json();
            if(data.profiles && data.profiles[name]) {
                localStorage.setItem('currentChat', name);
                location.reload();
            } else {
                alert("Такого пользователя нет!");
            }
        }

        // ... остальной код (отправка/загрузка) ...
        // Если видишь ошибку "City letter" при входе, 
        // значит браузер не может прочитать localStorage или JSON.
        // Очисти LocalStorage еще раз!
    </script>
</body>
</html>
