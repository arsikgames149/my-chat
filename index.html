<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Secure Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg-main: #0e1621; --bg-side: #17212b; --bg-panel: #242f3d; --text: #ffffff; --msg-me: #2b5278; --msg-them: #182533; --btn: #5288c1; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: var(--bg-main); color: var(--text); overflow: hidden; }
        #sidebar { width: 300px; background: var(--bg-side); border-right: 1px solid #000; display: flex; flex-direction: column; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #000; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover { background: #202b36; }
        .chat-item.active { background: var(--btn); }
        .avatar { width: 40px; height: 40px; background: var(--btn); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        #main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { max-width: 60%; display: flex; flex-direction: column; gap: 5px; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg { padding: 10px 15px; border-radius: 15px; background: var(--msg-them); }
        .msg.me { background: var(--msg-me); }
        #input-area { padding: 15px; background: var(--bg-side); display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--bg-panel); color: white; outline: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal.hidden { display: none; }
        .modal-content { background: var(--bg-side); padding: 30px; border-radius: 10px; text-align: center; }
        input { padding: 10px; margin: 10px 0; border-radius: 5px; border: none; width: 250px; }
        button { padding: 10px 20px; background: var(--btn); border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h3>Вход в секретный чат</h3>
            <input type="text" id="setup-name" placeholder="Твой ник">
            <button onclick="init()">Войти</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold;">Мои чаты</div>
        <div id="chat-list"></div>
    </div>

    <div id="main-area">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/9a59d7dc2e3ad773b0fa";
        let myName, currentChat = "General";

        function init() {
            myName = document.getElementById('setup-name').value;
            if(!myName) return;
            
            // Подхватываем ключ из ссылки, если есть
            const hash = window.location.hash.substring(1);
            if(hash) {
                localStorage.setItem('mySecretKey', hash);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            document.getElementById('setup-modal').classList.add('hidden');
            setInterval(fetchData, 2000);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            const key = localStorage.getItem('mySecretKey');
            
            if(!key) return alert("Нужен ключ! (Добавь его в ссылку или спроси у друга)");
            
            const encrypted = "E2EE:" + CryptoJS.AES.encrypt(text, key).toString();
            
            const res = await fetch(API_URL);
            const data = await res.json();
            data.messages.push({ from: myName, text: encrypted, time: Date.now() });
            
            await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            input.value = '';
        }

        async function fetchData() {
            const res = await fetch(API_URL, {cache: 'no-store'});
            const data = await res.json();
            const container = document.getElementById('messages');
            const key = localStorage.getItem('mySecretKey');
            
            container.innerHTML = '';
            data.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg-wrapper ${m.from === myName ? 'me' : ''}`;
                
                let decrypted = "🔒 Зашифровано";
                if(m.text.startsWith("E2EE:") && key) {
                    try {
                        decrypted = CryptoJS.AES.decrypt(m.text.replace("E2EE:", ""), key).toString(CryptoJS.enc.Utf8);
                    } catch(e) { decrypted = "🔑 Неверный ключ"; }
                }
                
                div.innerHTML = `<div class="msg ${m.from === myName ? 'me' : ''}">${m.from}: ${decrypted}</div>`;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
