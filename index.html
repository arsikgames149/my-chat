<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система ПВЗ</title>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #main { flex: 1; padding: 40px; }
        .order-item { padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .order-item:hover { background: #f0f0f0; }
        .status-ready { color: green; font-weight: bold; }
        .btn { padding: 15px; border: none; border-radius: 5px; cursor: pointer; background: #28a745; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3 style="padding: 20px;">Заказы в пункте:</h3>
        <div id="order-list">
            <div class="order-item" onclick="loadOrder('№12345')">№12345 — Иван И.</div>
            <div class="order-item" onclick="loadOrder('№67890')">№67890 — Анна П.</div>
        </div>
        <button class="btn" style="background:#007bff; margin: 20px;" onclick="addOrder()">+ Новый заказ</button>
    </div>
    
    <div id="main">
        <div id="order-details">
            <h1>Выберите заказ</h1>
            <p>Нажмите на номер заказа в списке, чтобы увидеть детали.</p>
        </div>
    </div>

    <script>
        function loadOrder(id) {
            document.getElementById('order-details').innerHTML = `
                <h1>Заказ ${id}</h1>
                <p>Статус: <span class="status-ready">Ожидает выдачи</span></p>
                <button class="btn" onclick="alert('Заказ выдан!')">Выдать заказ</button>
            `;
        }

        function addOrder() {
            const num = prompt("Введите номер заказа:");
            if(num) alert("Заказ " + num + " добавлен в систему!");
        }
    </script>
</body>
</html>
