<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
</head>
<body>
    <div id="status">Загрузка...</div>
    <div id="content" style="display:none;">
        <input type="text" id="name" placeholder="Твой ник">
        <button onclick="saveName()">Войти</button>
    </div>

    <script>
        // Проверяем, есть ли ник в памяти
        if(!localStorage.getItem('myUsername')) {
            document.getElementById('content').style.display = 'block';
            document.getElementById('status').innerText = 'Добро пожаловать!';
        } else {
            document.getElementById('status').innerText = 'Ты вошел как: ' + localStorage.getItem('myUsername');
        }

        function saveName() {
            const name = document.getElementById('name').value;
            if(name) {
                localStorage.setItem('myUsername', name);
                location.reload();
            }
        }
    </script>
</body>
</html>
