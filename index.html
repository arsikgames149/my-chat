<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #17212b; padding: 30px; border-radius: 10px; text-align: center; }
        button { background: #5288c1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Messenger v2</h1>
        <div id="status">Загрузка...</div>
        <div id="login-area" style="display:none;">
            <input type="text" id="name-input" placeholder="Твой ник">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <script>
        const myName = localStorage.getItem('myUsername');
        const statusDiv = document.getElementById('status');
        const loginArea = document.getElementById('login-area');

        if (!myName) {
            statusDiv.innerText = "Ты еще не вошел. Введи ник:";
            loginArea.style.display = 'block';
        } else {
            statusDiv.innerHTML = `Привет, <b>${myName}</b>! <br><br> <button onclick="localStorage.clear(); location.reload();">Выйти</button>`;
        }

        function login() {
            const name = document.getElementById('name-input').value;
            if (name) {
                localStorage.setItem('myUsername', name);
                location.reload();
            }
        }
    </script>
</body>
</html>
