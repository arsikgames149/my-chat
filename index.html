<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создатель Базы</title>
</head>
<body style="font-family: sans-serif; padding: 50px; text-align: center; background: #17212b; color: white;">
    <h2>Инструмент создания секретной ГосБазы</h2>
    <button onclick="createBase()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #005bff; color: white; border: none; border-radius: 8px;">Сгенерировать мою базу</button>
    <h3 id="result" style="color: #4caf50; margin-top: 30px;"></h3>

    <script>
        async function createBase() {
            document.getElementById('result').style.color = '#fff';
            document.getElementById('result').innerText = "Связываюсь с сервером... Подожди пару секунд...";
            try {
                const res = await fetch('https://api.npoint.io/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        "users": [
                            { "fio": "Арсений", "password": "676767", "role": "admin" }
                        ],
                        "fines": []
                    })
                });
                const data = await res.json();
                document.getElementById('result').style.color = '#4caf50';
                document.getElementById('result').innerHTML = `
                    ✅ База успешно создана!<br><br>
                    Твой новый ID:<br>
                    <b style="font-size: 28px; color: #ffeb3b; user-select: all;">${data.id}</b><br><br>
                    Скопируй этот ID, верни в index.html код ГосБазы и вставь его в строку API_URL.
                `;
            } catch (e) {
                document.getElementById('result').style.color = '#ff4d4f';
                document.getElementById('result').innerText = "Ошибка! Похоже, сервер npoint полностью заблокирован для твоего интернета. Напиши мне, и мы заменим его на другой сервис.";
            }
        }
    </script>
</body>
</html>
