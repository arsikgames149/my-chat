<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messenger Login</title>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #17212b; padding: 30px; border-radius: 10px; text-align: center; }
        input { padding: 10px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #5288c1; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box" id="auth-box">
        <h2 id="title">Вход</h2>
        <input type="text" id="name-input" placeholder="Твой ник">
        <br><br>
        <button onclick="saveName()">Войти и зарегистрироваться</button>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/3741109c73467226e5c9";
        
        // Проверяем, есть ли уже ник
        const savedName = localStorage.getItem('myUsername');
        if (savedName) {
            document.getElementById('title').innerText = "Ты вошел как: " + savedName;
            document.getElementById('name-input').style.display = 'none';
            document.querySelector('button').innerText = "Изменить тег";
            document.querySelector('button').onclick = () => {
                localStorage.removeItem('myUsername');
                location.reload();
            };
        }

        async function saveName() {
            const name = document.getElementById('name-input').value;
            if (!name) return alert("Введите ник!");

            // Сохраняем локально
            localStorage.setItem('myUsername', name);
            
            // Регистрируем в базе данных
            const res = await fetch(API_URL);
            const data = await res.json();
            data.profiles = data.profiles || {};
            data.profiles[name] = true;
            
            await fetch(API_URL, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data) 
            });
            
            location.reload();
        }
    </script>
</body>
</html>
