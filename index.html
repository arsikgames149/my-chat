<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Clone</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #0e1621; color: #fff; overflow: hidden; }
        
        #sidebar { width: 300px; background: #17212b; border-right: 1px solid #000; display: flex; flex-direction: column; }
        #my-profile { padding: 15px; background: #242f3d; display: flex; flex-direction: column; gap: 10px; }
        .profile-name { font-weight: bold; font-size: 18px; color: #fff; }
        .action-btn { background: #2b5278; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: #32608a; }
        
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #101921; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover { background: #202b36; }
        .chat-item.active { background: #2b5278; }
        
        /* Стили для аватарок */
        .avatar { width: 40px; height: 40px; background: #5288c1; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        #main-area { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        #chat-header { padding: 15px; background: #17212b; font-weight: bold; font-size: 18px; border-bottom: 1px solid #000; display: flex; align-items: center; gap: 10px;}
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 60%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        
        #input-area { padding: 15px; background: #17212b; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #242f3d; color: white; outline: none; }
        #send-btn { background: #5288c1; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        #attach-btn { background: #3b4b5c; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal.hidden { display: none; }
        .modal-content { background: #17212b; padding: 30px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .modal input[type="text"], .modal input[type="date"] { width: 90%; padding: 10px; margin: 10px 0 15px 0; border-radius: 5px; border: none; background: #242f3d; color: white; outline: none; }
    </style>

    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=109919751', 'ym');
        ym(109919751, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/109919751" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    </head>
<body>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Создай профиль</h3>
            <p>Придумай себе уникальный тег (имя):</p>
            <input type="text" id="setup-username" placeholder="Арсений">
            <button class="action-btn" onclick="initProfile()">Войти в чат</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Настройки профиля</h3>
            
            <div style="text-align: left; margin-bottom: 10px;">
                <label style="color: #7f91a4; font-size: 14px;">Аватарка (до 500 КБ):</label>
                <input type="file" id="settings-avatar" accept="image/*" style="margin-top: 5px; width: 100%;">
            </div>

            <div style="text-align: left; margin-bottom: 15px;">
                <label style="color: #7f91a4; font-size: 14px;">Дата рождения:</label>
                <input type="date" id="settings-dob" value="2000-11-01">
            </div>

            <button class="action-btn" onclick="saveSettings()" style="width: 100%; margin-bottom: 10px;">Сохранить в облако</button>
            <button class="action-btn" style="background:#8b3a3a; width: 100%;" onclick="closeSettings()">Отмена</button>
        </div>
    </div>

    <div id="search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Найти пользователя</h3>
            <p>Введи точный тег (имя):</p>
            <input type="text" id="search-username" placeholder="Кого ищем?">
            <button class="action-btn" onclick="startNewChat()">Начать чат</button>
            <button class="action-btn" style="background:#8b3a3a; margin-top:10px;" onclick="closeSearch()">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div id="my-profile">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar" id="my-avatar-display">?</div>
                <div>
                    <div style="color:#7f91a4; font-size: 12px;">Мой профиль:</div>
                    <div class="profile-name" id="my-name-display">Загрузка...</div>
                </div>
            </div>
            <button class="action-btn" onclick="openSettings()" style="margin-top: 10px;">⚙️ Настройки</button>
            <button class="action-btn" onclick="openSearch()">🔍 Найти пользователя</button>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-area">
        <div id="chat-header" class="hidden">
            <div class="avatar" id="header-avatar">?</div>
            <div id="header-name">Выберите чат слева</div>
        </div>
        <div id="messages">
            <div style="text-align:center; color:#7f91a4; margin-top:50px;">
                Выберите пользователя слева, чтобы начать общение.
            </div>
        </div>
        <div id="input-area" class="hidden">
            <input type="file" id="img-upload" accept="image/*" style="display:none;">
            <button id="attach-btn" onclick="document.getElementById('img-upload').click()">📷</button>
            
            <input type="text" id="msg-input" placeholder="Написать сообщение...">
            <button id="send-btn" onclick="sendTextMessage()">➤</button>
        </div>
    </div>

    <script>
        const BIN_ID = "9a59d7dc2e3ad773b0fa";
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let myUsername = localStorage.getItem('myUsername');
        let activeChats = JSON.parse(localStorage.getItem('myChats') || '[]');
        let currentChat = null;
        let allMessages = [];
        let globalProfiles = {}; // Здесь хранятся аватарки и даты рождения всех
        let tempAvatarBase64 = null; // Временное хранилище при выборе файла

        window.onload = () => {
            if (!myUsername) {
                document.getElementById('profile-modal').classList.remove('hidden');
            } else {
                document.getElementById('my-name-display').innerText = myUsername;
                fetchData();
                setInterval(fetchData, 2000); 
            }
            
            document.getElementById("msg-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") sendTextMessage();
            });

            // Загрузка аватарки в настройках
            document.getElementById("settings-avatar").addEventListener("change", function() {
                const file = this.files[0];
                if (!file) return;
                if(file.size > 500000) { // Ограничение 500 КБ для аватарок, чтобы не вешать базу
                    alert("Аватарка слишком тяжелая! Максимум 500 КБ.");
                    this.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) { tempAvatarBase64 = e.target.result; };
                reader.readAsDataURL(file);
            });

            // Отправка картинки в чат
            document.getElementById("img-upload").addEventListener("change", function() {
                const file = this.files[0];
                if (!file) return;
                if(file.size > 2000000) {
                    alert("Файл слишком большой! До 2 Мегабайт.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64Image = e.target.result;
                    await sendData("", base64Image);
                };
                reader.readAsDataURL(file);
            });
        };

        function initProfile() {
            const name = document.getElementById('setup-username').value.trim();
            if (name) {
                myUsername = name;
                localStorage.setItem('myUsername', myUsername);
                document.getElementById('profile-modal').classList.add('hidden');
                document.getElementById('my-name-display').innerText = myUsername;
                fetchData();
                setInterval(fetchData, 2000);
            }
        }

        // --- ЛОГИКА НАСТРОЕК ПРОФИЛЯ ---
        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            tempAvatarBase64 = null; // Сбрасываем временную картинку
            
            // Если профиль уже был сохранен в облаке, подтягиваем дату
            if (globalProfiles[myUsername] && globalProfiles[myUsername].dob) {
                document.getElementById('settings-dob').value = globalProfiles[myUsername].dob;
            }
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        async function saveSettings() {
            const dob = document.getElementById('settings-dob').value;
            
            try {
                // Скачиваем актуальную базу
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                
                if (!data.profiles) data.profiles = {};
                if (!data.profiles[myUsername]) data.profiles[myUsername] = {};

                // Обновляем данные
                if (tempAvatarBase64) data.profiles[myUsername].avatar = tempAvatarBase64;
                data.profiles[myUsername].dob = dob;

                // Сохраняем в npoint
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                closeSettings();
                fetchData(); // Сразу перерисовываем
            } catch (e) {
                alert("Ошибка сохранения профиля!");
            }
        }

        // --- ЛОГИКА ПОИСКА И ЧАТОВ ---
        function openSearch() {
            document.getElementById('search-modal').classList.remove('hidden');
            document.getElementById('search-username').value = '';
        }

        function closeSearch() {
            document.getElementById('search-modal').classList.add('hidden');
        }

        function startNewChat() {
            const friendName = document.getElementById('search-username').value.trim();
            if (friendName && friendName !== myUsername) {
                if (!activeChats.includes(friendName)) {
                    activeChats.push(friendName);
                    localStorage.setItem('myChats', JSON.stringify(activeChats));
                }
                closeSearch();
                openChat(friendName);
                renderChatList();
            }
        }

        // Получение Аватарки (либо картинка из профиля, либо буква)
        function getAvatarHTML(username) {
            if (globalProfiles[username] && globalProfiles[username].avatar) {
                return `<img src="${globalProfiles[username].avatar}" alt="${username}">`;
            }
            return username.charAt(0).toUpperCase();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            // Обновляем свою аватарку слева вверху
            document.getElementById('my-avatar-display').innerHTML = getAvatarHTML(myUsername);

            activeChats.forEach(chatName => {
                const div = document.createElement('div');
                div.className = `chat-item ${chatName === currentChat ? 'active' : ''}`;
                div.onclick = () => openChat(chatName);
                div.innerHTML = `
                    <div class="avatar">${getAvatarHTML(chatName)}</div>
                    <div style="font-weight:bold;">${chatName}</div>
                `;
                list.appendChild(div);
            });
        }

        function openChat(chatName) {
            currentChat = chatName;
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('header-name').innerText = chatName;
            document.getElementById('header-avatar').innerHTML = getAvatarHTML(chatName);
            renderChatList();
            renderMessages();
        }

        function renderMessages() {
            if (!currentChat) return;
            const container = document.getElementById('messages');
            container.innerHTML = '';

            const chatHistory = allMessages.filter(m => 
                (m.from === myUsername && m.to === currentChat) ||
                (m.from === currentChat && m.to === myUsername)
            );

            if (chatHistory.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#7f91a4; margin-top:20px;">Здесь пока нет сообщений. Напишите первым!</div>';
                return;
            }

            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                const isMe = msg.from === myUsername;
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                if (msg.text) div.innerText = msg.text;
                if (msg.image) {
                    const img = document.createElement('img');
                    img.src = msg.image;
                    div.appendChild(img);
                }

                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        // Основная функция загрузки (сообщения + профили)
        async function fetchData() {
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                
                allMessages = data.messages || [];
                globalProfiles = data.profiles || {}; // Загружаем все профили

                let chatsUpdated = false;
                allMessages.forEach(m => {
                    if (m.to === myUsername && !activeChats.includes(m.from)) {
                        activeChats.push(m.from);
                        chatsUpdated = true;
                    }
                });

                if (chatsUpdated) {
                    localStorage.setItem('myChats', JSON.stringify(activeChats));
                }

                renderChatList(); // Перерисовываем список, чтобы обновились новые аватарки
                
                if (currentChat) {
                    document.getElementById('header-avatar').innerHTML = getAvatarHTML(currentChat);
                    renderMessages();
                }
            } catch (e) {
                console.error("Ошибка загрузки:", e);
            }
        }

        async function sendTextMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text === "" || !currentChat) return;
            input.value = '';
            await sendData(text, null);
        }

        async function sendData(textData, imageData) {
            try {
                const res = await fetch(API_URL, { cache: 'no-store' });
                const data = await res.json();
                if(!data.messages) data.messages = [];
                
                data.messages.push({ 
                    from: myUsername, 
                    to: currentChat, 
                    text: textData,
                    image: imageData 
                });

                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                fetchData();
            } catch (e) {
                alert("Ошибка отправки! Проверьте интернет.");
            }
        }
    </script>
</body>
</html>
