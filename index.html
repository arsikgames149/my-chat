<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle RPG Quest</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Анимация сжатия при клике по монстру */
        .attack-anim:active {
            transform: scale(0.96);
            transition: transform 0.03s ease-out;
        }

        /* Плавное появление всплывающих цифр урона (для будущих фич) */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        /* Кастомный скроллбар для магазина */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans h-screen flex flex-col select-none">

    <!-- Верхняя панель -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center border-b border-gray-700">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">Уровень героя: <span id="hero-level">1</span></h1>
        </div>
        <div class="text-xl font-mono text-yellow-400">
            Золото: <span id="gold-display">0</span>
        </div>
    </header>

    <!-- Основной интерфейс -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Левая панель: Босс / Кликер -->
        <section class="w-1/2 flex flex-col items-center justify-center border-r border-gray-700 p-8 relative">
            <h2 class="text-3xl font-bold mb-2 text-red-400" id="enemy-name">Гоблин-разведчик</h2>
            <div class="w-2/3 bg-gray-700 h-6 rounded-full mb-2 overflow-hidden shadow-inner">
                <div id="enemy-health-bar" class="bg-gradient-to-r from-red-600 to-red-500 h-full w-full transition-all duration-100"></div>
            </div>
            <p class="mb-8 font-mono text-lg">ХП: <span id="enemy-health-text">50 / 50</span></p>
            
            <!-- Кнопка атаки -->
            <button id="click-target" class="attack-anim w-64 h-64 bg-gray-800 rounded-full border-4 border-gray-600 flex items-center justify-center hover:border-red-500 hover:bg-gray-700 shadow-2xl transition-colors cursor-pointer">
                <span class="text-2xl font-bold text-gray-400">БИТЬ</span>
            </button>

            <div class="mt-8 text-center text-gray-400 space-y-1">
                <p>Урон за клик: <span id="click-damage-display" class="text-white font-bold">1</span></p>
                <p>Урон в секунду (DPS): <span id="dps-display" class="text-white font-bold">0</span></p>
            </div>
        </section>

        <!-- Правая панель: Магазин -->
        <section class="w-1/2 bg-gray-800 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-2">
                <h2 class="text-2xl font-bold">Улучшения</h2>
                <button id="reset-btn" class="text-xs bg-red-900/50 hover:bg-red-700 text-red-200 px-3 py-1 rounded transition-colors">
                    Сбросить прогресс
                </button>
            </div>
            
            <div id="shop-container" class="space-y-4">
                <!-- Сюда JS рендерит карточки товаров -->
            </div>
        </section>
    </main>

    <!-- Наша логика -->
    <script>
        // Конфиг базовых апгрейдов
        const DEFAULT_UPGRADES = [
            { id: 'sword1', name: "Ржавый меч", type: "click", value: 1, baseCost: 15, currentCost: 15, count: 0, desc: "+1 к урону за клик" },
            { id: 'sword2', name: "Стальной палаш", type: "click", value: 5, baseCost: 100, currentCost: 100, count: 0, desc: "+5 к урону за клик" },
            { id: 'mercenary1', name: "Наемник-новичок", type: "auto", value: 1, baseCost: 50, currentCost: 50, count: 0, desc: "+1 урон в секунду" },
            { id: 'mercenary2', name: "Рыцарь Авангарда", type: "auto", value: 8, baseCost: 400, currentCost: 400, count: 0, desc: "+8 урона в секунду" }
        ];

        const game = {
            gold: 0,
            clickDamage: 1,
            autoDps: 0,
            heroLevel: 1,
            enemiesDefeated: 0,
            
            enemy: {
                name: "Гоблин-разведчик",
                maxHealth: 50,
                currentHealth: 50,
                reward: 10
            },

            upgrades: [],

            // Инициализация игры
            init: function() {
                this.loadGame();
                this.registerEvents();
                this.updateUI();
                this.renderShop();
                
                // Запуск цикла (10 тиков в секунду)
                setInterval(() => this.tick(), 100);
                // Автосохранение каждые 10 секунд
                setInterval(() => this.saveGame(), 10000);
            },

            registerEvents: function() {
                document.getElementById('click-target').addEventListener('click', () => this.attack());
                document.getElementById('reset-btn').addEventListener('click', () => {
                    if(confirm("Вы уверены, что хотите полностью сбросить прогресс?")) this.resetGame();
                });
            },

            attack: function() {
                this.dealDamage(this.clickDamage);
            },

            dealDamage: function(amount) {
                this.enemy.currentHealth -= amount;
                if (this.enemy.currentHealth <= 0) {
                    this.defeatEnemy();
                }
                this.updateUI();
            },

            defeatEnemy: function() {
                this.gold += this.enemy.reward;
                this.enemiesDefeated++;
                
                // Ап уровня героя каждые 5 убитых мобов
                this.heroLevel = Math.floor(this.enemiesDefeated / 5) + 1;

                // Масштабирование следующего врага
                this.enemy.maxHealth = Math.floor(50 * Math.pow(1.25, this.heroLevel - 1));
                this.enemy.currentHealth = this.enemy.maxHealth;
                this.enemy.reward = Math.floor(10 * Math.pow(1.2, this.heroLevel - 1));
                
                // Маленький пулл имен для разнообразия
                const names = ["Гоблин", "Орк-налетчик", "Каменный голем", "Темный рыцарь", "Древний Дракон"];
                this.enemy.name = names[Math.min(Math.floor((this.heroLevel - 1) / 2), names.length - 1)];
            },

            buyUpgrade: function(index) {
                let upgrade = this.upgrades[index];
                if (this.gold >= upgrade.currentCost) {
                    this.gold -= upgrade.currentCost;
                    upgrade.count++;
                    
                    // Перерасчет характеристик
                    this.recalculateStats();

                    // Формула роста цены: baseCost * 1.15^count
                    upgrade.currentCost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.count));
                    
                    this.renderShop();
                    this.updateUI();
                    this.saveGame(); // Сохраняем при покупке
                }
            },

            recalculateStats: function() {
                // Сброс до базовых значений
                this.clickDamage = 1;
                this.autoDps = 0;

                // Считаем бонусы от всех купленных штук
                this.upgrades.forEach(upg => {
                    if (upg.type === "click") this.clickDamage += (upg.value * upg.count);
                    if (upg.type === "auto") this.autoDps += (upg.value * upg.count);
                });
            },

            tick: function() {
                if (this.autoDps > 0) {
                    this.dealDamage(this.autoDps / 10);
                }
                // Динамически обновляем доступность кнопок в магазине без полного перерендера
                this.updateShopButtons();
            },

            updateUI: function() {
                document.getElementById('gold-display').innerText = Math.floor(this.gold);
                document.getElementById('click-damage-display').innerText = this.clickDamage;
                document.getElementById('dps-display').innerText = this.autoDps;
                document.getElementById('hero-level').innerText = this.heroLevel;
                document.getElementById('enemy-name').innerText = this.enemy.name;
                
                let hpPercent = Math.max(0, (this.enemy.currentHealth / this.enemy.maxHealth) * 100);
                document.getElementById('enemy-health-bar').style.width = hpPercent + '%';
                document.getElementById('enemy-health-text').innerText = `${Math.ceil(this.enemy.currentHealth)} / ${this.enemy.maxHealth}`;
            },

            renderShop: function() {
                const container = document.getElementById('shop-container');
                container.innerHTML = '';
                
                this.upgrades.forEach((upg, index) => {
                    container.innerHTML += `
                        <div class="bg-gray-700 p-4 rounded-lg flex justify-between items-center shadow-lg border border-gray-600/50">
                            <div>
                                <h3 class="text-lg font-bold text-white">${upg.name} <span class="text-sm text-blue-400">(Ур. ${upg.count})</span></h3>
                                <p class="text-sm text-gray-400">${upg.desc}</p>
                            </div>
                            <button data-index="${index}" onclick="game.buyUpgrade(${index})" class="shop-btn px-4 py-2 font-bold rounded text-white transition-all transform active:scale-95 shadow">
                                ${upg.currentCost} Золота
                            </button>
                        </div>
                    `;
                });
                this.updateShopButtons();
            },

            updateShopButtons: function() {
                const buttons = document.querySelectorAll('.shop-btn');
                buttons.forEach(btn => {
                    const index = btn.getAttribute('data-index');
                    const upgrade = this.upgrades[index];
                    if (this.gold >= upgrade.currentCost) {
                        btn.className = "shop-btn px-4 py-2 font-bold rounded text-white bg-blue-600 hover:bg-blue-500 cursor-pointer shadow";
                    } else {
                        btn.className = "shop-btn px-4 py-2 font-bold rounded text-gray-400 bg-gray-600 cursor-not-allowed opacity-50 shadow";
                    }
                });
            },

            // Логика сохранения данных
            saveGame: function() {
                const saveData = {
                    gold: this.gold,
                    heroLevel: this.heroLevel,
                    enemiesDefeated: this.enemiesDefeated,
                    enemy: this.enemy,
                    upgrades: this.upgrades
                };
                localStorage.setItem('idle_rpg_save', JSON.stringify(saveData));
            },

            // Логика загрузки данных
            loadGame: function() {
                const rawData = localStorage.getItem('idle_rpg_save');
                if (rawData) {
                    try {
                        const saved = JSON.parse(rawData);
                        this.gold = saved.gold ?? 0;
                        this.heroLevel = saved.heroLevel ?? 1;
                        this.enemiesDefeated = saved.enemiesDefeated ?? 0;
                        this.enemy = saved.enemy ?? this.enemy;
                        this.upgrades = saved.upgrades ?? JSON.parse(JSON.stringify(DEFAULT_UPGRADES));
                        this.recalculateStats();
                        return;
                    } catch(e) {
                        console.error("Ошибка загрузки сейва, сброс...", e);
                    }
                }
                // Если сейва нет, загружаем дефолтные апгрейды
                this.upgrades = JSON.parse(JSON.stringify(DEFAULT_UPGRADES));
            },

            resetGame: function() {
                localStorage.removeItem('idle_rpg_save');
                location.reload();
            }
        };

        // Старт
        window.onload = () => game.init();
    </script>
</body>
</html>
